<!-- @dsCard group="Components" viewport="680x200" name="Avatar" subtitle="Gradient squircle and circle — primary · teal · gold — with initials or photo" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); padding: 24px; color: var(--text-primary); }
  .sec { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: var(--ls-label); color: var(--text-secondary); margin: 0 0 10px; }
  .row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-bottom: 20px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .lbl { font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Avatar } = window.VitaCarePlusDesignSystem_da9342;
    function Demo() {
      const sizes = [32, 42, 56, 72];
      return (
        <div>
          <p className="sec">Squircle (default) — primary · teal · gold</p>
          <div className="row">
            {['RK','PS','AM','SG'].map((init, i) => (
              <div key={init} className="cell">
                <Avatar initials={init} gradient={['primary','teal','gold','primary'][i]} size={52} />
                <span className="lbl">{['Primary','Teal','Gold','Primary'][i]}</span>
              </div>
            ))}
          </div>
          <p className="sec">Circle shape — sizes</p>
          <div className="row">
            {sizes.map(s => (
              <div key={s} className="cell">
                <Avatar initials="RK" shape="circle" size={s} />
                <span className="lbl">{s}px</span>
              </div>
            ))}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
