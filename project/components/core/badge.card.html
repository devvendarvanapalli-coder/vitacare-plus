<body>

  <script type="text/babel">

    function Demo() {
      return (
        <div>
          <p className="sec">Status variants</p>
          <div className="row">
            <Badge status="info">Video</Badge>
            <Badge status="success">Confirmed</Badge>
            <Badge status="warning">Pending</Badge>
            <Badge status="critical">Critical</Badge>
            <Badge status="gold">Gold Member</Badge>

          <p className="sec">No dot</p>

            <Badge status="info" dot={false}>In-Clinic</Badge>
            <Badge status="success" dot={false}>Taken</Badge>
            <Badge status="warning" dot={false}>Due</Badge>
            <Badge status="critical" dot={false}>High Risk</Badge>
            <Badge status="gold" dot={false}>GOLD</Badge>

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
