<!-- @dsCard group="Components" viewport="680x160" name="Chip" subtitle="Selectable filter pill — primary and secondary accent, selected/rest states" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); padding: 24px; color: var(--text-primary); }
  .sec { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: var(--ls-label); color: var(--text-secondary); margin: 0 0 10px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 18px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Chip } = window.VitaCarePlusDesignSystem_da9342;
    function Demo() {
      const [spec, setSpec] = React.useState('Diabetologist');
      const [cond, setCond] = React.useState('Diabetes');
      return (
        <div>
          <p className="sec">Primary (specialist filter)</p>
          <div className="row">
            {['Diabetologist','Cardiologist','Ophthalmologist','Orthopaedic'].map(s => (
              <Chip key={s} selected={spec === s} onClick={() => setSpec(s)}>{s}</Chip>
            ))}
          </div>
          <p className="sec">Secondary (condition filter)</p>
          <div className="row">
            {['Diabetes','Anemia','Arthritis','Vitamin D','Hair Loss'].map(c => (
              <Chip key={c} color="secondary" selected={cond === c} onClick={() => setCond(c)}>{c}</Chip>
            ))}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
