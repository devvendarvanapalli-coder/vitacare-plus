<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); padding: 24px; color: var(--text-primary); }
  .sec { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: var(--ls-label); color: var(--text-secondary); margin: 0 0 10px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input } = window.VitaCarePlusDesignSystem_da9342;
    function Demo() {
      const [phone, setPhone] = React.useState('+91 98765 43210');
      const [search, setSearch] = React.useState('');
      const [glucose, setGlucose] = React.useState('');
      return (
        <div>
          <p className="sec">States</p>
          <div className="grid">
            <Input label="Mobile Number" value={phone} onChange={e => setPhone(e.target.value)}
              placeholder="+91 99999 99999" leadingIcon="phone"
              helper="We'll send an OTP to this number" />
            <Input label="Search Doctors" value={search} onChange={e => setSearch(e.target.value)}
              placeholder="Search by name or specialization" leadingIcon="search" trailingIcon="tune" />
            <Input label="Fasting Glucose" value={glucose} onChange={e => setGlucose(e.target.value)}
              placeholder="e.g. 126" type="number" trailingIcon="water_drop"
              error={glucose && Number(glucose) > 180 ? 'Value above target range (70–180 mg/dL)' : ''} />
            <Input label="Email Address" value="" onChange={() => {}}
              placeholder="name@example.com" leadingIcon="mail" disabled />
          </div>
          <p className="sec">Sizes</p>
          <div style={{ display: 'flex', gap: 16 }}>
            <Input label="Small (44px)" value="" onChange={() => {}} placeholder="sm" size="sm" style={{ flex: 1 }} />
            <Input label="Medium (52px)" value="" onChange={() => {}} placeholder="md" size="md" style={{ flex: 1 }} />
            <Input label="Large (56px)" value="" onChange={() => {}} placeholder="lg" size="lg" style={{ flex: 1 }} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
