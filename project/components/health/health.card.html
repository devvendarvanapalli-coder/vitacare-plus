<!-- @dsCard group="Components" viewport="680x380" name="Health Cards" subtitle="MetricCard vitals strip · MedicationCard list — dashboard patterns" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); padding: 24px; color: var(--text-primary); }
  .sec { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: var(--ls-label); color: var(--text-secondary); margin: 0 0 10px; }
  .strip { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; margin-bottom: 22px; }
  .meds { display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { MetricCard, MedicationCard } = window.VitaCarePlusDesignSystem_da9342;
    const MEDS_INIT = [
      { name: 'Metformin 500mg',  dosage: '1 tablet · 9:00 AM',  taken: true,  icon: 'medication' },
      { name: 'Glimepiride 2mg',  dosage: '1 tablet · 8:00 AM',  taken: true,  icon: 'medication' },
      { name: 'Vitamin D3 60k',   dosage: '1 capsule · 2:00 PM', taken: false, icon: 'medication_liquid' },
    ];
    function Demo() {
      const [meds, setMeds] = React.useState(MEDS_INIT);
      const toggle = i => setMeds(prev => prev.map((m, j) => j === i ? { ...m, taken: !m.taken } : m));
      return (
        <div>
          <p className="sec">MetricCard — Health Overview strip</p>
          <div className="strip">
            <MetricCard label="HbA1c" value="6.8" unit="%" icon="water_drop" iconColor="var(--vc-hba1c-teal)" delta={-3.2} deltaLabel="from last month" onClick={() => {}} />
            <MetricCard label="Blood Sugar" value="126" unit="mg/dL" icon="monitor_heart" iconColor="var(--vc-glucose-blue)" delta={1.4} deltaLabel="fasting" onClick={() => {}} />
            <MetricCard label="Weight" value="74.5" unit="kg" icon="monitor_weight" iconColor="var(--vc-weight-purple)" onClick={() => {}} />
            <MetricCard label="Blood Pressure" value="128/82" unit="mmHg" icon="favorite" iconColor="var(--vc-bp-orange)" delta={0} deltaLabel="stable" onClick={() => {}} />
          </div>
          <p className="sec">MedicationCard — Today's Medications</p>
          <div className="meds">
            {meds.map((m, i) => <MedicationCard key={m.name} {...m} onToggle={() => toggle(i)} />)}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
