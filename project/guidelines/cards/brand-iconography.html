<!-- @dsCard group="Brand" viewport="700x210" name="Iconography" subtitle="Material Symbols Rounded — outlined at rest, filled for active states" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 24px; color: var(--text-primary); }
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap: 16px 8px; }
  .ico { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .iconify { font-size: 26px; color: var(--text-primary); }
  .n { font-size: 9px; color: var(--text-secondary); }
  .hint { font-size: 11px; color: var(--text-secondary); margin-bottom:16px; }
  .hint b { color: var(--text-primary); }
</style>
</head>
<body>
  <div class="hint">App uses <b>Material Icons (rounded)</b>; recreated here with <b>Material Symbols Rounded</b> (delivered as inline SVG via Iconify).</div>
  <div class="grid">
    <div class="ico"><span class="iconify" data-icon="material-symbols:home-rounded"></span><span class="n">home</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:grid-view-rounded"></span><span class="n">modules</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:calendar-today-outline-rounded"></span><span class="n">appts</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:person-rounded"></span><span class="n">profile</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:water-drop-outline-rounded"></span><span class="n">glucose</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:favorite-rounded"></span><span class="n">heart</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:monitor-weight-rounded"></span><span class="n">weight</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:bloodtype-outline-rounded"></span><span class="n">anemia</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:videocam-outline-rounded"></span><span class="n">video</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:medication-outline-rounded"></span><span class="n">meds</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:workspace-premium-rounded"></span><span class="n">premium</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:notifications-outline-rounded"></span><span class="n">alerts</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:description-outline-rounded"></span><span class="n">reports</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:local-hospital-outline-rounded"></span><span class="n">clinic</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:trending-up-rounded"></span><span class="n">trend</span></div>
    <div class="ico"><span class="iconify" data-icon="material-symbols:warning-outline-rounded"></span><span class="n">warning</span></div>
  </div>
</body>
</html>
