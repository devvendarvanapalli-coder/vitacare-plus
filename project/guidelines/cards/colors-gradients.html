<!-- @dsCard group="Colors" viewport="700x160" name="Gradients" subtitle="Diagonal 135° gradients for buttons, hero cards and membership tiers" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .g { height: 52px; border-radius: var(--r-card); display:flex; align-items:flex-end; padding:8px 10px; color:#fff; font-size:11px; font-weight:700; text-shadow:0 1px 2px rgba(0,0,0,.2); }
</style>
</head>
<body>
  <div class="grid">
    <div class="g" style="background:var(--grad-primary)">Primary</div>
    <div class="g" style="background:var(--grad-teal)">Teal</div>
    <div class="g" style="background:var(--grad-sos)">SOS</div>
    <div class="g" style="background:var(--grad-gold)">Gold</div>
    <div class="g" style="background:var(--grad-platinum)">Platinum</div>
    <div class="g" style="background:var(--grad-success)">Success</div>
  </div>
</body>
</html>
