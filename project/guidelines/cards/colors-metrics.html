<!-- @dsCard group="Colors" viewport="700x150" name="Health metric accents" subtitle="Each tracked vital owns a consistent accent hue across charts & cards" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; text-align:center; }
  .dot { height: 56px; border-radius: var(--r-xl); }
  .name { font-size: 11px; font-weight: 600; color: var(--text-primary); margin-top:8px; }
  .hex { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="dot" style="background:var(--vc-glucose-blue)"></div><div class="name">Glucose</div><div class="hex">#2563EB</div></div>
    <div class="sw"><div class="dot" style="background:var(--vc-hba1c-teal)"></div><div class="name">HbA1c</div><div class="hex">#0D9488</div></div>
    <div class="sw"><div class="dot" style="background:var(--vc-weight-purple)"></div><div class="name">Weight</div><div class="hex">#7C3AED</div></div>
    <div class="sw"><div class="dot" style="background:var(--vc-bp-orange)"></div><div class="name">Blood Pressure</div><div class="hex">#EA580C</div></div>
    <div class="sw"><div class="dot" style="background:var(--vc-heart-rate)"></div><div class="name">Heart Rate</div><div class="hex">#EF4444</div></div>
    <div class="sw"><div class="dot" style="background:var(--vc-pink)"></div><div class="name">Women's</div><div class="hex">#EC4899</div></div>
  </div>
</body>
</html>
