<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Slate ramp" subtitle="Text, borders and surfaces are built from a cool slate ramp" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 12px; font-weight: 700; color: var(--text-primary); }
  .hex { font-size: 11px; color: var(--text-secondary); font-variant-numeric: tabular-nums; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--vc-slate-900)"></div><div class="meta"><div class="name">Text Primary</div><div class="hex">#0F172A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vc-slate-500)"></div><div class="meta"><div class="name">Text Secondary</div><div class="hex">#64748B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vc-slate-400)"></div><div class="meta"><div class="name">Text Hint</div><div class="hex">#94A3B8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vc-slate-200)"></div><div class="meta"><div class="name">Border</div><div class="hex">#E2E8F0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vc-slate-50)"></div><div class="meta"><div class="name">Background</div><div class="hex">#F8FAFC</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vc-white)"></div><div class="meta"><div class="name">Surface</div><div class="hex">#FFFFFF</div></div></div>
  </div>
</body>
</html>
