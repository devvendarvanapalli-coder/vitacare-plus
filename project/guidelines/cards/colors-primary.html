<!-- @dsCard group="Colors" viewport="700x150" name="Primary & Secondary" subtitle="Blue-600 primary, Teal-600 secondary, with tints" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 12px; font-weight: 700; color: var(--text-primary); }
  .hex { font-size: 11px; color: var(--text-secondary); font-variant-numeric: tabular-nums; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--vc-blue-600)"></div><div class="meta"><div class="name">Primary</div><div class="hex">#2563EB</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vc-blue-700)"></div><div class="meta"><div class="name">Primary Strong</div><div class="hex">#1D4ED8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vc-blue-50)"></div><div class="meta"><div class="name">Primary Surface</div><div class="hex">#EFF6FF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vc-teal-600)"></div><div class="meta"><div class="name">Secondary</div><div class="hex">#0D9488</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vc-teal-700)"></div><div class="meta"><div class="name">Teal Strong</div><div class="hex">#0F766E</div></div></div>
  </div>
</body>
</html>
