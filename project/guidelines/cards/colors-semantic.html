<!-- @dsCard group="Colors" viewport="700x150" name="Semantic status" subtitle="Success, warning, error and gold — always used as 10% tint + solid" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 44px; border-radius: var(--r-lg); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; }
  .tint { height: 20px; border-radius: var(--r-sm); margin-top:6px; display:flex;align-items:center;justify-content:center; font-size:10px;font-weight:600; }
  .name { font-size: 12px; font-weight: 700; color: var(--text-primary); margin-top:6px; }
  .hex { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--success)">Solid</div><div class="tint" style="background:color-mix(in srgb, var(--success) 10%, transparent);color:var(--success)">10% tint</div><div class="name">Success</div><div class="hex">#059669</div></div>
    <div class="sw"><div class="chip" style="background:var(--warning)">Solid</div><div class="tint" style="background:color-mix(in srgb, var(--warning) 10%, transparent);color:var(--warning)">10% tint</div><div class="name">Warning</div><div class="hex">#D97706</div></div>
    <div class="sw"><div class="chip" style="background:var(--error)">Solid</div><div class="tint" style="background:color-mix(in srgb, var(--error) 10%, transparent);color:var(--error)">10% tint</div><div class="name">Error</div><div class="hex">#DC2626</div></div>
    <div class="sw"><div class="chip" style="background:var(--gold)">Solid</div><div class="tint" style="background:color-mix(in srgb, var(--gold) 10%, transparent);color:var(--gold)">10% tint</div><div class="name">Gold</div><div class="hex">#D97706</div></div>
  </div>
</body>
</html>
