<!-- @dsCard group="Colors" viewport="680x480" name="Dark Theme" subtitle="Full token set under [data-theme=dark] — navy bg, translucent borders, elevated cards" -->
<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); padding: 24px; color: var(--text-primary); }
  .sec { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-secondary); margin: 0 0 10px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 20px; }
  .swatch { width: 44px; height: 44px; border-radius: 10px; border: 1px solid var(--border); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; }
  .label { font-size: 11px; color: var(--text-secondary); margin-top: 6px; text-align: center; }
  .token { font-size: 10px; font-family: monospace; color: var(--text-hint); }
  .col { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Card, Badge, Avatar, Chip } = window.VitaCarePlusDesignSystem_da9342;

    const swatches = [
      { label: '--bg', token: '#050D1A', style: { background: '#050D1A' } },
      { label: '--surface / --card', token: '#0F1E35', style: { background: '#0F1E35' } },
      { label: '--primary', token: '#3B82F6', style: { background: '#3B82F6' } },
      { label: '--secondary', token: '#14B8A6', style: { background: '#14B8A6' } },
      { label: '--border', token: 'rgba(59,130,246,.15)', style: { background: 'rgba(59,130,246,.15)', border: '1px solid rgba(59,130,246,.3)' } },
      { label: '--text-primary', token: '#F1F5F9', style: { background: '#F1F5F9' } },
      { label: '--text-secondary', token: '#94A3B8', style: { background: '#94A3B8' } },
      { label: '--success', token: '#10B981', style: { background: '#10B981' } },
      { label: '--warning', token: '#F59E0B', style: { background: '#F59E0B' } },
      { label: '--error', token: '#EF4444', style: { background: '#EF4444' } },
    ];

    function Demo() {
      const [chip, setChip] = React.useState('Diabetes');
      return (
        <div>
          <p className="sec">Dark surface tokens</p>
          <div className="row" style={{ marginBottom: 24 }}>
            {swatches.map(s => (
              <div key={s.label} className="col">
                <div className="swatch" style={s.style} />
                <div className="label">{s.label}</div>
                <div className="token">{s.token}</div>
              </div>
            ))}
          </div>
          <p className="sec">Components on dark</p>
          <div className="row">
            <Button variant="primary" leadingIcon="login">Sign In</Button>
            <Button variant="secondary">Book Video</Button>
            <Button variant="outlined">Cancel</Button>
            <Button variant="ghost">Skip</Button>
          </div>
          <div className="row" style={{ alignItems: 'stretch' }}>
            <Card style={{ width: 200 }}>
              <div style={{ fontWeight: 700 }}>Dark card</div>
              <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 4 }}>Navy bg · hairline border</div>
            </Card>
            <Card gradient="primary" style={{ width: 180 }}>
              <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 1, opacity: 0.85 }}>GOLD MEMBER</div>
              <div style={{ fontWeight: 700, marginTop: 4 }}>Plan active</div>
            </Card>
          </div>
          <div className="row">
            <Badge status="success">Confirmed</Badge>
            <Badge status="warning">Pending</Badge>
            <Badge status="critical">Critical</Badge>
            <Badge status="gold">Gold</Badge>
            <Avatar initials="RK" />
            <Avatar initials="PS" gradient="teal" />
            {['Diabetes','Anemia','Arthritis'].map(c => (
              <Chip key={c} selected={chip===c} onClick={() => setChip(c)}>{c}</Chip>
            ))}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
