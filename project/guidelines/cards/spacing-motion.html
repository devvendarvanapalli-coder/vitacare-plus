<!-- @dsCard group="Spacing" viewport="700x160" name="Motion & press states" subtitle="Tap-down shrink — buttons to 0.97, cards to 0.98 — hover this card" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 24px; color: var(--text-primary); display:flex; gap:24px; align-items:center; }
  .demo { text-align:center; }
  .btn { background: var(--grad-primary); color:#fff; border:none; height:52px; padding:0 28px; border-radius: var(--r-lg); font-family:inherit; font-size:15px; font-weight:600; box-shadow: var(--shadow-primary); transition: transform var(--dur-fast) var(--ease-std); cursor:pointer; }
  .btn:active { transform: scale(0.97); }
  .card { width: 200px; height: 64px; background: var(--surface); border-radius: var(--r-card); box-shadow: var(--shadow-card); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; transition: transform var(--dur-base) var(--ease-std); cursor:pointer; }
  .card:active { transform: scale(0.98); }
  .t { font-size: 10px; color: var(--text-secondary); margin-top:10px; }
</style>
</head>
<body>
  <div class="demo"><button class="btn">Sign In</button><div class="t">scale 0.97 · 100ms</div></div>
  <div class="demo"><div class="card">Tap card</div><div class="t">scale 0.98 · 150ms</div></div>
  <div class="t" style="max-width:160px;text-align:left">Transitions use 200ms ease for color &amp; size; logo entrance uses elastic-out.</div>
</body>
</html>
