<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px grid — 20px is the default screen gutter" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 24px; color: var(--text-primary); }
  .row { display:flex; align-items:flex-end; gap: 18px; }
  .col { text-align:center; }
  .bar { background: var(--primary); border-radius: 3px; width: 100%; }
  .v { font-size: 11px; font-weight:700; margin-top: 6px; }
  .t { font-size: 10px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="col" style="width:24px"><div class="bar" style="height:4px"></div><div class="v">4</div><div class="t">sp-1</div></div>
    <div class="col" style="width:28px"><div class="bar" style="height:8px"></div><div class="v">8</div><div class="t">sp-2</div></div>
    <div class="col" style="width:32px"><div class="bar" style="height:12px"></div><div class="v">12</div><div class="t">sp-3</div></div>
    <div class="col" style="width:40px"><div class="bar" style="height:16px"></div><div class="v">16</div><div class="t">sp-4</div></div>
    <div class="col" style="width:48px"><div class="bar" style="height:20px"></div><div class="v">20</div><div class="t">sp-5</div></div>
    <div class="col" style="width:56px"><div class="bar" style="height:24px"></div><div class="v">24</div><div class="t">sp-6</div></div>
    <div class="col" style="width:68px"><div class="bar" style="height:32px"></div><div class="v">32</div><div class="t">sp-8</div></div>
    <div class="col" style="width:80px"><div class="bar" style="height:40px"></div><div class="v">40</div><div class="t">sp-10</div></div>
  </div>
</body>
</html>
