<!-- @dsCard group="Type" viewport="700x210" name="Title, Body & Caption" subtitle="Workhorse text styles — 1.6 line-height on body for readability" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 24px; color: var(--text-primary); }
  .spec { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .spec:last-child { border-bottom: none; }
  .label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: var(--ls-label); margin-bottom: 4px; }
  .title { font-size: var(--fs-title); font-weight: var(--fw-semibold); line-height: var(--lh-title); }
  .body { font-size: var(--fs-body); font-weight: var(--fw-regular); line-height: var(--lh-body); }
  .caption { font-size: var(--fs-caption); font-weight: var(--fw-regular); color: var(--text-secondary); line-height: var(--lh-title); }
</style>
</head>
<body>
  <div class="spec"><div class="label">Title · 18 / 600</div><div class="title">Today's Medications</div></div>
  <div class="spec"><div class="label">Body · 14 / 400 · 1.6</div><div class="body">Sign in to continue your health journey and keep your chronic care on track.</div></div>
  <div class="spec"><div class="label">Caption · 12 / 400</div><div class="caption">Valid till Dec 31, 2025 · inclusive of 18% GST</div></div>
</body>
</html>
