<!-- @dsCard group="Type" viewport="700x180" name="Display & Headline" subtitle="Inter ExtraBold/Bold with tight negative tracking for screen titles" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 24px; color: var(--text-primary); }
  .spec { display:flex; align-items:baseline; gap:16px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .spec:last-child { border-bottom: none; }
  .label { width: 120px; flex-shrink:0; font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: var(--ls-label); }
  .display { font-size: var(--fs-display); font-weight: var(--fw-extra); letter-spacing: var(--ls-display); line-height: var(--lh-tight); }
  .headline { font-size: var(--fs-headline); font-weight: var(--fw-bold); letter-spacing: var(--ls-headline); line-height: var(--lh-snug); }
</style>
</head>
<body>
  <div class="spec"><div class="label">Display · 32 / 800</div><div class="display">Welcome back</div></div>
  <div class="spec"><div class="label">Headline · 24 / 700</div><div class="headline">Upgrade Your Plan</div></div>
</body>
</html>
