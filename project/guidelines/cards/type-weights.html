<!-- @dsCard group="Type" viewport="700x150" name="Inter weights" subtitle="One typeface, six weights — 400 through 900" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 20px; color: var(--text-primary); }
  .row { display:flex; flex-wrap:wrap; gap: 10px 28px; }
  .w { display:flex; flex-direction:column; }
  .g { font-size: 30px; line-height: 1.1; }
  .n { font-size: 10px; color: var(--text-secondary); text-transform:uppercase; letter-spacing: var(--ls-label); }
</style>
</head>
<body>
  <div class="row">
    <div class="w"><span class="g" style="font-weight:400">Aa</span><span class="n">400 Regular</span></div>
    <div class="w"><span class="g" style="font-weight:500">Aa</span><span class="n">500 Medium</span></div>
    <div class="w"><span class="g" style="font-weight:600">Aa</span><span class="n">600 Semibold</span></div>
    <div class="w"><span class="g" style="font-weight:700">Aa</span><span class="n">700 Bold</span></div>
    <div class="w"><span class="g" style="font-weight:800">Aa</span><span class="n">800 ExtraBold</span></div>
    <div class="w"><span class="g" style="font-weight:900">Aa</span><span class="n">900 Black</span></div>
  </div>
</body>
</html>
