<!-- @startingPoint section="Patient App" subtitle="Appointment booking flow with specialist picker, date/time selection, and confirmation" viewport="402x874" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Appointment Booking</title>
<link rel="stylesheet" href="../styles.css">
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
  html,body{margin:0;height:100%;background:#E7EBF0;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #stage{transform-origin:center center;}
  ::-webkit-scrollbar{display:none;}
  @keyframes vcspin{to{transform:rotate(360deg);}}
  @keyframes vcsheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="patient-app/ios-frame.jsx"></script>
<script type="text/babel" src="patient-app/vc-ui.jsx"></script>
<script type="text/babel" src="patient-app/screen-appointments.jsx"></script>
<script type="text/babel">
  function App() {
    return (
      <IOSDevice>
        <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
          <div style={{height:50,flexShrink:0}}/>
          <div style={{flex:1,overflowY:'auto',overflowX:'hidden'}}>
            <AppointmentsScreen/>
          </div>
        </div>
      </IOSDevice>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  function fit(){
    const s=Math.min((window.innerWidth-48)/402,(window.innerHeight-48)/874,1);
    document.getElementById('stage').style.transform=`scale(${s})`;
  }
  window.addEventListener('resize',fit);
  setTimeout(fit,60);
</script>
</body>
</html>
