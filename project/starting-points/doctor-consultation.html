<!-- @startingPoint section="Doctor App" subtitle="Doctor consultation view: patient vitals, notes, recent Rx, write prescription" viewport="402x874" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doctor Consultation</title>
<link rel="stylesheet" href="../styles.css">
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
  html,body{margin:0;height:100%;background:#E7EBF0;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #stage{transform-origin:center center;}
  ::-webkit-scrollbar{display:none;}
  @keyframes vcspin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="doctor-app/ios-frame.jsx"></script>
<script type="text/babel" src="doctor-app/vc-ui.jsx"></script>
<script type="text/babel" src="doctor-app/screen-consultation.jsx"></script>
<script type="text/babel" src="doctor-app/screen-rx.jsx"></script>
<script type="text/babel">
  function App() {
    const [push,setPush]=React.useState(null);
    const patient={name:'Rohan Kapoor',initials:'RK',age:34,gender:'M',conditions:['Diabetes','Hypertension'],gradient:'primary'};
    return (
      <IOSDevice>
        <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
          <div style={{height:50,flexShrink:0}}/>
          {push==='rx'
            ? <RxScreen patient={patient} onBack={()=>setPush(null)}/>
            : <ConsultationScreen patient={patient} onBack={()=>{}} onWriteRx={()=>setPush('rx')}/>
          }
        </div>
      </IOSDevice>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  function fit(){
    const s=Math.min((window.innerWidth-48)/402,(window.innerHeight-48)/874,1);
    document.getElementById('stage').style.transform=`scale(${s})`;
  }
  window.addEventListener('resize',fit);
  setTimeout(fit,60);
</script>
</body>
</html>
