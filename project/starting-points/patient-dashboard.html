<!-- @startingPoint section="Patient App" subtitle="Full patient dashboard with metrics, medications, appointments and module grid" viewport="402x874" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patient Dashboard</title>
<link rel="stylesheet" href="../styles.css">
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
  html,body{margin:0;height:100%;background:#E7EBF0;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #stage{transform-origin:center center;}
  ::-webkit-scrollbar{display:none;}
  @keyframes vcspin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="patient-app/ios-frame.jsx"></script>
<script type="text/babel" src="patient-app/vc-ui.jsx"></script>
<script type="text/babel" src="patient-app/screen-dashboard.jsx"></script>
<script type="text/babel">
  const NAV_ITEMS = [
    {icon:'home',label:'Home'},{icon:'grid_view',label:'Modules'},
    null,
    {icon:'calendar_today',label:'Appts'},{icon:'person',label:'Profile'}
  ];

  function BottomNav({tab,onTab,onSos}) {
    return (
      <div style={{display:'flex',alignItems:'flex-start',height:72,paddingBottom:4,background:'var(--surface)',borderTop:'1px solid var(--border)',boxShadow:'var(--shadow-nav)'}}>
        {NAV_ITEMS.map((it,i)=>{
          if(!it) return (
            <div key="sos" style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',paddingTop:6}}>
              <button onClick={onSos} style={{width:52,height:52,borderRadius:'50%',border:'none',cursor:'pointer',background:'var(--grad-sos)',boxShadow:'var(--shadow-sos)',color:'#fff',fontSize:12,fontWeight:800,letterSpacing:0.5}}>SOS</button>
              <span style={{fontSize:9,fontWeight:600,color:'var(--vc-sos)',marginTop:3}}>Emergency</span>
            </div>
          );
          const active=tab===it.icon;
          return (
            <button key={it.icon} onClick={()=>onTab(it.icon)} style={{flex:1,appearance:'none',background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:4,paddingTop:12}}>
              <Icon name={it.icon} size={22} fill={active?1:0} color={active?'var(--primary)':'var(--text-secondary)'}/>
              <span style={{fontSize:10,fontWeight:active?700:500,color:active?'var(--primary)':'var(--text-secondary)'}}>{it.label}</span>
            </button>
          );
        })}
      </div>
    );
  }

  function App() {
    const [tab,setTab]=React.useState('home');
    return (
      <IOSDevice>
        <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
          <div style={{height:50,flexShrink:0}}/>
          <div style={{flex:1,overflowY:'auto',overflowX:'hidden'}}>
            <DashboardScreen onOpenMembership={()=>{}} onOpenAppointments={()=>setTab('calendar_today')}/>
          </div>
          <BottomNav tab={tab} onTab={setTab} onSos={()=>{}}/>
          <div style={{height:20,flexShrink:0,background:'var(--surface)'}}/>
        </div>
      </IOSDevice>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  function fit(){
    const s=Math.min((window.innerWidth-48)/402,(window.innerHeight-48)/874,1);
    document.getElementById('stage').style.transform=`scale(${s})`;
  }
  window.addEventListener('resize',fit);
  setTimeout(fit,60);
</script>
</body>
</html>
