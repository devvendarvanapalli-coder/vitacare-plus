<!-- @dsCard group="Patient App" viewport="460x900" name="Patient App — interactive" subtitle="Login → dashboard → appointments → membership → SOS, fully clickable" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VitaCare Plus — Patient App</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { background: #E7EBF0; font-family: var(--font-sans); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #stage { transform-origin: center center; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes vcspin { to { transform: rotate(360deg); } }
  @keyframes vcpop { 0% { opacity: 0; transform: scale(.8); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes vcfade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes vcsheet { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes vcpulse { 0% { transform: scale(1); opacity: .55; } 100% { transform: scale(2.0); opacity: 0; } }
</style>
</head>
<body>
  <div id="stage"><div id="root"></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="vc-ui.jsx"></script>
  <script type="text/babel" src="screen-login.jsx"></script>
  <script type="text/babel" src="screen-dashboard.jsx"></script>
  <script type="text/babel" src="screen-appointments.jsx"></script>
  <script type="text/babel" src="screen-membership.jsx"></script>
  <script type="text/babel" src="screen-sos.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    function fit() {
      const pad = 24;
      const s = Math.min((window.innerWidth - pad * 2) / 402, (window.innerHeight - pad * 2) / 874, 1);
      document.getElementById('stage').style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit);
    setTimeout(fit, 60);
  </script>
</body>
</html>
